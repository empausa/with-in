<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="w/in — a quiet minute." />
<title>within</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: rgb(70, 60, 55);
    --halo: rgba(245, 238, 227, 0.45); /* soft backdrop behind text, polarity follows --ink */
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --slow: 1400ms;
    --slower: 2200ms;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: "Fraunces", "EB Garamond", Georgia, "Times New Roman", serif;
    font-weight: 300;
    font-style: italic;
    color: var(--ink);
    background: #f5ede3;
    /* Layered text halo — inherits to all descendants. Pulls text off the
       gradient at transitional hours where fg/bg luminance can get close. */
    text-shadow:
      0 0 2px var(--halo),
      0 0 10px var(--halo),
      0 0 22px var(--halo),
      0 0 44px var(--halo);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    inset: 0;
    user-select: none;
    -webkit-user-select: none;
  }

  #field {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem;
    width: 100%;
    max-width: 640px;
  }

  /* The mark: w/in */
  #mark {
    font-size: clamp(3.5rem, 10vw, 6.5rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: -0.03em;
    line-height: 1;
    display: inline-flex;
    align-items: baseline;
    opacity: 0;
    transition: opacity var(--slower) var(--ease);
    will-change: opacity;
  }
  #mark-inner {
    display: inline-flex;
    align-items: baseline;
    animation: markBreath 9s var(--ease) infinite;
    will-change: transform;
  }
  #mark .slash {
    font-weight: 200;
    opacity: 0.45;
    margin: 0 0.04em;
    transform: translateY(-0.06em) rotate(2deg);
    display: inline-block;
  }

  @keyframes markBreath {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.014); }
  }

  /* The invitation */
  #invitation {
    font-size: 1.05rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.02em;
    opacity: 0;
    margin: 0;
    transition: opacity var(--slower) var(--ease);
    cursor: pointer;
  }

  /* The breath */
  #breath {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--slower) var(--ease);
  }
  #breath svg {
    width: min(70vw, 70vh, 420px);
    height: min(70vw, 70vh, 420px);
    overflow: visible;
  }
  #breath-circle {
    fill: none;
    stroke: currentColor;
    stroke-width: 0.6;
    opacity: 0.55;
  }
  #breath-word {
    position: absolute;
    font-size: clamp(1.1rem, 2.3vw, 1.55rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.01em;
    margin: 0;
    opacity: 0;
    pointer-events: none;
    will-change: opacity;
  }

  /* The leave-word prompt */
  #leave {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--slower) var(--ease);
  }
  #leave .prompt {
    font-size: 1.15rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.01em;
    opacity: 0.7;
    margin: 0;
    text-align: center;
    line-height: 1.5;
  }
  #word-input {
    background: transparent;
    border: none;
    outline: none;
    font: inherit;
    font-size: clamp(1.4rem, 3vw, 1.9rem);
    font-style: italic;
    font-weight: 300;
    text-align: center;
    color: inherit;
    caret-color: currentColor;
    width: min(10em, 70vw);
    padding: 0.4em 0;
    border: none;
    border-bottom: 1px solid currentColor;
    border-bottom-color: color-mix(in srgb, currentColor 30%, transparent);
    opacity: 0.7;
    transition: opacity var(--slow) var(--ease), border-color var(--slow) var(--ease);
  }
  #word-input:focus {
    opacity: 1;
    border-bottom-color: color-mix(in srgb, currentColor 55%, transparent);
  }
  #word-input::placeholder { color: currentColor; opacity: 0.25; font-style: italic; }

  /* Kept in today */
  #kept {
    position: absolute;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.95rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.03em;
    opacity: 0;
    margin: 0;
    transition: opacity var(--slower) var(--ease);
    pointer-events: none;
  }

  /* State-driven visibility */
  body[data-state="ambient"] #mark,
  body[data-state="invited"] #mark { opacity: 0.92; }
  body[data-state="invited"] #invitation { opacity: 0.55; }
  body[data-state="minute"] #mark { opacity: 0; transform: scale(0.96); }
  body[data-state="minute"] #breath { opacity: 1; }
  body[data-state="leave-word"] #breath { opacity: 0; }
  body[data-state="leave-word"] #leave { opacity: 1; pointer-events: auto; }
  body[data-state="still"] #leave { opacity: 0; }
  body[data-state="still"] #mark { opacity: 0; }
  body[data-state="still"] #kept { opacity: 0.75; }
  body[data-state="ambient"]:not([data-just-kept]) #kept { opacity: 0; }

  /* Discreet knobs at the bottom — present, never loud */
  .knobs {
    position: fixed;
    bottom: clamp(1.25rem, 3.5vh, 2.6rem);
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    align-items: baseline;
    gap: 0.9rem;
    font-size: 0.82rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.02em;
    color: inherit;
    opacity: 0.28;
    transition: opacity 1.2s var(--ease);
    pointer-events: auto;
    user-select: none;
  }
  .knobs:hover,
  .knobs:focus-within { opacity: 0.7; }

  .knob {
    background: transparent;
    border: none;
    /* Horizontal padding reserves room for the dot on either side.
       Every knob has it — so the label is always centered in its button,
       and the rhythm between knobs is symmetric whether a dot is present or not. */
    padding: 0.2em 1em;
    font: inherit;
    color: inherit;
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.8s var(--ease);
    position: relative;
    display: inline-flex;
    align-items: baseline;
    justify-content: center;
  }
  .knob:hover,
  .knob:focus-visible { opacity: 1; outline: none; }
  .knob .dot {
    position: absolute;
    left: 0.35em;
    top: 50%;
    width: 0.36em;
    height: 0.36em;
    border-radius: 50%;
    background: currentColor;
    opacity: 0;
    transform: translate(0, -50%);
    transition: opacity 0.8s var(--ease);
  }
  .knob.knob-on .dot { opacity: 0.7; }
  .knob .label { transition: color 0.8s var(--ease); }
  /* Scene label locks to a slot wide enough for the longest scene name —
     so cycling doesn't shift the whole bar. Text stays centered in its slot. */
  #btn-scene .label {
    display: inline-block;
    text-align: center;
  }
  .knob-sep { opacity: 0.35; }

  /* Knobs vanish during the ritual */
  body[data-state="minute"] .knobs,
  body[data-state="leave-word"] .knobs,
  body[data-state="still"] .knobs {
    opacity: 0;
    pointer-events: none;
  }

  /* Words panel — the column of kept words, revealed above the knobs */
  .words-panel {
    position: fixed;
    bottom: calc(clamp(1.25rem, 3.5vh, 2.6rem) + 2.8em);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.05em;
    font-size: 0.98rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.01em;
    color: inherit;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s var(--ease);
    z-index: 2;
    text-align: center;
    max-height: 60vh;
    overflow: hidden;
  }
  .words-panel.visible { opacity: 0.72; }
  .words-panel .w {
    display: block;
    line-height: 1.55;
    transition: opacity 0.8s var(--ease);
  }
  body[data-state="minute"] .words-panel,
  body[data-state="leave-word"] .words-panel,
  body[data-state="still"] .words-panel {
    opacity: 0 !important;
    pointer-events: none;
  }

  @media (prefers-reduced-motion: reduce) {
    #mark { animation: none; }
  }

  @media (max-width: 640px) {
    #mark { font-size: clamp(3rem, 14vw, 5rem); }
    .knobs { font-size: 0.78rem; gap: 0.7rem; }
  }
</style>
</head>
<body data-state="ambient">
  <canvas id="field" aria-hidden="true"></canvas>
  <main>
    <div id="mark" aria-label="within">
      <span id="mark-inner"><span class="w">w</span><span class="slash">/</span><span class="in">in</span></span>
    </div>
    <p id="invitation">take a minute</p>
    <div id="breath" aria-hidden="true">
      <svg viewBox="-100 -100 200 200" preserveAspectRatio="xMidYMid meet">
        <circle id="breath-circle" cx="0" cy="0" r="38" />
      </svg>
      <p id="breath-word"></p>
    </div>
    <div id="leave">
      <p class="prompt">leave a word, or close your eyes and go</p>
      <input id="word-input" type="text" maxlength="16" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text" aria-label="a word" />
    </div>
    <p id="kept">kept in today</p>
  </main>
  <div id="words-panel" class="words-panel" aria-hidden="true" hidden></div>
  <nav class="knobs" aria-label="controls">
    <button id="btn-sound" class="knob" type="button" aria-pressed="false">
      <span class="dot" aria-hidden="true"></span><span class="label">sound</span>
    </button>
    <span class="knob-sep" aria-hidden="true">·</span>
    <button id="btn-scene" class="knob" type="button">
      <span class="label">breath</span>
    </button>
    <span id="sep-words" class="knob-sep" aria-hidden="true" hidden>·</span>
    <button id="btn-words" class="knob" type="button" aria-pressed="false" hidden>
      <span class="dot" aria-hidden="true"></span><span class="label">words</span>
    </button>
  </nav>

<script type="module">
  "use strict";

  // ────── States ──────
  const S = { AMBIENT: "ambient", INVITED: "invited", MINUTE: "minute", LEAVE: "leave-word", STILL: "still" };

  // ────── Utils ──────
  const lerp  = (a, b, t) => a + (b - a) * t;
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const easeInOutSine = t => 0.5 - 0.5 * Math.cos(Math.PI * clamp(t, 0, 1));
  const easeOutCubic  = t => 1 - Math.pow(1 - clamp(t, 0, 1), 3);

  const lerpColor = (a, b, t) => [lerp(a[0], b[0], t), lerp(a[1], b[1], t), lerp(a[2], b[2], t)];
  const rgba = (c, a = 1) => `rgba(${(c[0]*255)|0}, ${(c[1]*255)|0}, ${(c[2]*255)|0}, ${a})`;
  const rgb  = (c) => rgba(c, 1);

  function hashString(s) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
    }
    return h;
  }
  function mulberry32(seed) {
    let s = seed >>> 0;
    return function () {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const now = () => new Date();
  // Dev override: `?hour=6.5` locks the displayed hour for testing the palette.
  const _urlHour = new URLSearchParams(location.search).get("hour");
  const hourFrac = _urlHour !== null
    ? () => ((parseFloat(_urlHour) % 24) + 24) % 24
    : () => { const d = now(); return d.getHours() + d.getMinutes() / 60 + d.getSeconds() / 3600; };
  const dayKey = () => { const d = now(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; };

  // ────── Palette (time-mapped) ──────
  // bg = [top color, bottom color]; accent = glow color; ink = text/stroke color
  // ink field is unused (we derive ink from bg luminance at runtime); kept for future tuning
  const K = [
    { h: 0,   bg: [[0.11,0.11,0.20],[0.06,0.07,0.14]], accent: [0.47,0.46,0.62] },
    { h: 5,   bg: [[0.18,0.16,0.26],[0.23,0.18,0.24]], accent: [0.62,0.48,0.52] },
    { h: 6.6, bg: [[0.28,0.22,0.30],[0.38,0.28,0.32]], accent: [0.70,0.52,0.50] }, // pre-dawn glow, still dim
    { h: 7,   bg: [[0.93,0.82,0.80],[0.97,0.93,0.88]], accent: [0.80,0.63,0.59] }, // full dawn lift
    { h: 11,  bg: [[0.97,0.94,0.89],[0.98,0.96,0.92]], accent: [0.85,0.72,0.58] },
    { h: 14,  bg: [[0.97,0.93,0.87],[0.96,0.91,0.84]], accent: [0.82,0.68,0.52] },
    { h: 17,  bg: [[0.92,0.77,0.62],[0.82,0.53,0.41]], accent: [0.66,0.37,0.28] },
    { h: 18.6,bg: [[0.62,0.38,0.40],[0.50,0.30,0.38]], accent: [0.60,0.35,0.35] }, // late dusk, lower-mid
    { h: 19,  bg: [[0.34,0.24,0.34],[0.22,0.18,0.30]], accent: [0.52,0.40,0.50] }, // evening, darker
    { h: 21,  bg: [[0.20,0.19,0.32],[0.12,0.13,0.22]], accent: [0.50,0.50,0.66] },
    { h: 24,  bg: [[0.11,0.11,0.20],[0.06,0.07,0.14]], accent: [0.47,0.46,0.62] },
  ];

  function getPalette() {
    const h = hourFrac();
    let i = 0;
    while (i < K.length - 1 && K[i + 1].h <= h) i++;
    const a = K[i], b = K[i + 1] || K[0];
    const span = (b.h - a.h) || 1;
    const t = easeInOutSine((h - a.h) / span);
    return {
      bg: [lerpColor(a.bg[0], b.bg[0], t), lerpColor(a.bg[1], b.bg[1], t)],
      accent: lerpColor(a.accent, b.accent, t),
      ink: INK_DARK, // placeholder; updatePalette() will set the real ink from luminance
    };
  }

  // Derive ink + halo from the current bg luminance so text always contrasts
  // cleanly, regardless of the scene layer on top. Mutates pal.ink so canvas
  // functions that use pal.ink stay in sync with CSS.
  function smoothstep(e0, e1, x) {
    const t = clamp((x - e0) / (e1 - e0), 0, 1);
    return t * t * (3 - 2 * t);
  }
  const INK_LIGHT = [0.96, 0.93, 0.87];   // near-white warm for dark backgrounds
  const INK_DARK  = [0.12, 0.10, 0.08];   // near-black warm for light backgrounds
  const HALO_LIGHT = [0.99, 0.97, 0.93];  // pale halo behind dark text
  const HALO_DARK  = [0.04, 0.03, 0.07];  // inky halo behind light text
  const INK_LIGHT_LUM = 0.299*INK_LIGHT[0] + 0.587*INK_LIGHT[1] + 0.114*INK_LIGHT[2];
  const INK_DARK_LUM  = 0.299*INK_DARK[0]  + 0.587*INK_DARK[1]  + 0.114*INK_DARK[2];

  function updatePalette(pal) {
    // Use the midpoint of the two bg stops as the luminance reference.
    const base = [
      (pal.bg[0][0] + pal.bg[1][0]) / 2,
      (pal.bg[0][1] + pal.bg[1][1]) / 2,
      (pal.bg[0][2] + pal.bg[1][2]) / 2,
    ];
    const lum = 0.299 * base[0] + 0.587 * base[1] + 0.114 * base[2];
    // Pick whichever ink polarity has greater luminance distance from bg —
    // guaranteed maximum contrast. Smooth only within a 2% band around the
    // crossover so ink never lingers at a midtone that matches the bg.
    const darkContrast  = Math.abs(INK_DARK_LUM  - lum);
    const lightContrast = Math.abs(INK_LIGHT_LUM - lum);
    const crossover = (INK_LIGHT_LUM + INK_DARK_LUM) / 2; // midpoint between the two inks
    const t = smoothstep(crossover - 0.01, crossover + 0.01, lum);
    // t = 0 → use LIGHT ink (bg is dark-side); t = 1 → use DARK ink.
    const ink = lerpColor(INK_LIGHT, INK_DARK, t);
    const halo = lerpColor(HALO_DARK, HALO_LIGHT, t);
    // Halo alpha rises at midtones (where contrast is weakest).
    const midtoneBoost = 1 - Math.abs(2 * lum - 1);
    const haloAlpha = 0.35 + 0.55 * midtoneBoost;
    document.documentElement.style.setProperty("--ink", rgb(ink));
    document.documentElement.style.setProperty("--halo", rgba(halo, haloAlpha));
    pal.ink = ink;
  }

  // ────── Marks (persisted for today) ──────
  const MARK_KEY = () => "within_marks_" + dayKey();
  function loadMarks() {
    try { return JSON.parse(localStorage.getItem(MARK_KEY()) || "[]"); } catch { return []; }
  }
  function saveMark(m) {
    const marks = loadMarks();
    marks.push(m);
    const trimmed = marks.slice(-12);
    localStorage.setItem(MARK_KEY(), JSON.stringify(trimmed));
    return trimmed;
  }
  function cleanupOldMarks() {
    const keep = MARK_KEY();
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.startsWith("within_marks_") && k !== keep) localStorage.removeItem(k);
    }
  }
  cleanupOldMarks();

  // ────── Canvas Field ──────
  const field = document.getElementById("field");
  const ctx = field.getContext("2d");
  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = Math.floor(window.innerWidth  * DPR);
    H = Math.floor(window.innerHeight * DPR);
    field.width  = W;
    field.height = H;
    field.style.width  = window.innerWidth  + "px";
    field.style.height = window.innerHeight + "px";
  }
  window.addEventListener("resize", resize);
  resize();

  let freshSeed = null;
  let freshBornAt = 0; // ms
  const STILL_HOLD_MS = 9000;

  // ────── Scenes: three ways the palette moves ──────
  // Each scene is a middle layer painted over the base gradient,
  // using the same time-aware palette. Marks render above all scenes.
  const SCENE_ORDER = ["breath", "tide", "lights"];

  function drawBreathScene(t, pal) {
    const d1x = W * (0.5 + 0.18 * Math.sin(t * 0.035));
    const d1y = H * (0.42 + 0.14 * Math.cos(t * 0.028));
    const r1 = Math.min(W, H) * 0.65;
    const rg1 = ctx.createRadialGradient(d1x, d1y, 0, d1x, d1y, r1);
    rg1.addColorStop(0, rgba(pal.accent, 0.11));
    rg1.addColorStop(0.7, rgba(pal.accent, 0.02));
    rg1.addColorStop(1, rgba(pal.accent, 0));
    ctx.fillStyle = rg1;
    ctx.fillRect(0, 0, W, H);

    const d2x = W * (0.48 - 0.16 * Math.sin(t * 0.025 + 1));
    const d2y = H * (0.55 + 0.12 * Math.cos(t * 0.021 + 0.7));
    const r2 = Math.min(W, H) * 0.58;
    const rg2 = ctx.createRadialGradient(d2x, d2y, 0, d2x, d2y, r2);
    rg2.addColorStop(0, rgba(pal.bg[0], 0.22));
    rg2.addColorStop(1, rgba(pal.bg[0], 0));
    ctx.fillStyle = rg2;
    ctx.fillRect(0, 0, W, H);
  }

  function drawTideScene(t, pal) {
    // Two soft horizontal bands drift up and down — like light on water
    const c1 = H * (0.5 + 0.28 * Math.sin(t * 0.024));
    const h1 = H * 0.28;
    const g1 = ctx.createLinearGradient(0, c1 - h1, 0, c1 + h1);
    g1.addColorStop(0, rgba(pal.accent, 0));
    g1.addColorStop(0.5, rgba(pal.accent, 0.13));
    g1.addColorStop(1, rgba(pal.accent, 0));
    ctx.fillStyle = g1;
    ctx.fillRect(0, 0, W, H);

    const c2 = H * (0.5 + 0.34 * Math.cos(t * 0.019 + 1.3));
    const h2 = H * 0.34;
    const g2 = ctx.createLinearGradient(0, c2 - h2, 0, c2 + h2);
    g2.addColorStop(0, rgba(pal.bg[0], 0));
    g2.addColorStop(0.5, rgba(pal.bg[0], 0.22));
    g2.addColorStop(1, rgba(pal.bg[0], 0));
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, W, H);
  }

  function drawLightsScene(t, pal) {
    // Several small points drift in slow ellipses — motes of light
    const count = 9;
    const m = Math.min(W, H);
    for (let i = 0; i < count; i++) {
      const homeX = W * (0.12 + ((i * 0.137) % 0.76));
      const homeY = H * (0.12 + ((i * 0.281) % 0.76));
      const ew = m * 0.13;
      const eh = m * 0.09;
      const phase = i * 1.37;
      const x = homeX + ew * Math.sin(t * 0.02 * (0.7 + (i % 3) * 0.15) + phase);
      const y = homeY + eh * Math.cos(t * 0.018 * (0.7 + ((i * 2) % 3) * 0.15) + phase);
      const r = m * 0.07;
      const color = (i % 2 === 0) ? pal.accent : pal.bg[0];
      const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
      rg.addColorStop(0, rgba(color, 0.18));
      rg.addColorStop(0.5, rgba(color, 0.05));
      rg.addColorStop(1, rgba(color, 0));
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);
    }
  }

  const SCENES = {
    breath: drawBreathScene,
    tide:   drawTideScene,
    lights: drawLightsScene,
  };

  let currentScene = localStorage.getItem("within_scene") || "breath";
  if (!SCENES[currentScene]) currentScene = "breath";

  function drawBloom(seed, intensity, pal) {
    const rnd = mulberry32(seed);
    const cx = (0.25 + rnd() * 0.5) * W;
    const cy = (0.28 + rnd() * 0.45) * H;
    const base = Math.min(W, H) * 0.28;
    const blobs = 5;
    for (let i = 0; i < blobs; i++) {
      const ox = (rnd() - 0.5) * base * 1.2;
      const oy = (rnd() - 0.5) * base * 1.2;
      const r = base * (0.55 + rnd() * 0.9);
      const mix = rnd();
      const c = mix < 0.55 ? pal.accent : pal.bg[0];
      const rg = ctx.createRadialGradient(cx + ox, cy + oy, 0, cx + ox, cy + oy, r);
      rg.addColorStop(0, rgba(c, 0.22 * intensity));
      rg.addColorStop(0.6, rgba(c, 0.06 * intensity));
      rg.addColorStop(1, rgba(c, 0));
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawField(tMs) {
    const pal = getPalette();
    updatePalette(pal);

    // Base vertical gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, rgb(pal.bg[0]));
    g.addColorStop(1, rgb(pal.bg[1]));
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Scene layer (current choice)
    const t = tMs / 1000;
    SCENES[currentScene](t, pal);

    // Persisted marks — ghost blooms
    const marks = loadMarks();
    for (const m of marks) {
      drawBloom(m.seed, 0.55, pal);
    }

    // Fresh bloom — louder, then ease back
    if (freshSeed !== null) {
      const age = performance.now() - freshBornAt;
      const t01 = clamp(age / STILL_HOLD_MS, 0, 1);
      const boost = lerp(1.6, 0.0, easeOutCubic(t01)); // extra on top of ghost
      if (boost > 0.01) drawBloom(freshSeed, boost, pal);
      if (t01 >= 1) freshSeed = null;
    }

    // rAF when visible (smooth); setTimeout when hidden (keeps state
    // correct for headless screenshots + background tabs).
    if (document.visibilityState === "visible") {
      requestAnimationFrame(drawField);
    } else {
      setTimeout(() => drawField(performance.now()), 120);
    }
  }
  drawField(performance.now());

  // ────── UI refs ──────
  const els = {
    body: document.body,
    mark: document.getElementById("mark"),
    invitation: document.getElementById("invitation"),
    breath: document.getElementById("breath"),
    breathCircle: document.getElementById("breath-circle"),
    breathWord: document.getElementById("breath-word"),
    leave: document.getElementById("leave"),
    wordInput: document.getElementById("word-input"),
    kept: document.getElementById("kept"),
  };

  let state = S.AMBIENT;
  function setState(s) {
    state = s;
    els.body.dataset.state = s;
  }

  // ────── Ambient → Invited ──────
  let invitationTimer = null;
  function scheduleInvitation() {
    clearTimeout(invitationTimer);
    invitationTimer = setTimeout(() => {
      if (state === S.AMBIENT) setState(S.INVITED);
    }, 4200);
  }
  scheduleInvitation();

  // ────── Language ──────
  // Detect from browser default; "pt-*" gets Portuguese, anything else gets English.
  // `?lang=pt` or `?lang=en` overrides for dev/testing.
  const urlLang = new URLSearchParams(location.search).get("lang");
  const LANG = ((urlLang || navigator.language || "en").toLowerCase().startsWith("pt")) ? "pt" : "en";
  document.documentElement.lang = LANG;

  const STRINGS = {
    en: {
      invitation: "take a minute",
      prompt: "leave a word, or close your eyes and go",
      kept: "kept in today",
      sound: "sound",
      scenes: { breath: "breath", tide: "tide", lights: "lights" },
      words: "words",
    },
    pt: {
      // EU Portuguese, intimate tu-form; chosen for quiet, not protocol
      invitation: "um minuto para ti",
      prompt: "deixa uma palavra, ou fecha os olhos e vai",
      kept: "guardado hoje",
      sound: "som",
      scenes: { breath: "respiro", tide: "maré", lights: "luzes" },
      words: "palavras",
    },
  };

  // ────── Entering the Minute ──────
  // Word pools — not translations. Each language's pool is chosen for the
  // words that carry the feeling in that language, on their own terms.
  const WORD_POOLS = {
    en: [
      "room","thaw","enough","hush","bloom","still","breathe","soft",
      "open","ease","dusk","mend","linger","alight","near","cradle",
      "quiet","slow","home","here","rest","warm","dawn","keep",
    ],
    pt: [
      // Words Portuguese holds on its own — mostly untranslatable, or deeper in PT than in EN.
      "colo",        // the crook of an arm where someone is held
      "sossego",     // the peculiar peace of being unbothered
      "aconchego",   // nestled warmth
      "remanso",     // a still pool in a river
      "manso",       // gentle, unhurried
      "alento",      // a breath that revives
      "madrugada",   // the hours before dawn
      "alvorada",    // first light
      "entardecer",  // the evening falling
      "luar",        // moonlight
      "brisa",       // a small wind
      "ternura",     // tenderness, emotional
      "morada",      // dwelling, old-poetic for home
      "abrigo",      // shelter
      "pousa",       // settles, alights (as a bird does)
      "respira",     // breathe
      "serena",      // serene, clear
      "demora",      // lingers, takes its time
      "perto",       // near
      "devagar",     // slowly
      "agora",       // now
      "fica",        // stay
      "leveza",      // lightness
      "doçura",      // sweetness
    ],
  };
  const wordPool = WORD_POOLS[LANG];

  // Apply strings to the DOM
  document.getElementById("invitation").textContent = STRINGS[LANG].invitation;
  document.querySelector("#leave .prompt").textContent = STRINGS[LANG].prompt;
  document.getElementById("kept").textContent = STRINGS[LANG].kept;
  document.querySelector("#btn-sound .label").textContent = STRINGS[LANG].sound;
  function updateSceneLabel() {
    document.querySelector("#btn-scene .label").textContent = STRINGS[LANG].scenes[currentScene];
  }
  updateSceneLabel();

  // Lock the scene label to the width of the longest option so cycling
  // doesn't shift the whole bar. Measured after fonts load for accuracy.
  function lockSceneLabelWidth() {
    const label = document.querySelector("#btn-scene .label");
    if (!label) return;
    const original = label.textContent;
    let maxW = 0;
    for (const name of SCENE_ORDER) {
      label.textContent = STRINGS[LANG].scenes[name];
      const w = label.getBoundingClientRect().width;
      if (w > maxW) maxW = w;
    }
    label.textContent = original;
    // Add a hair of padding so italic descenders/ascenders never clip
    label.style.minWidth = (maxW + 2) + "px";
  }
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(lockSceneLabelWidth);
  } else {
    setTimeout(lockSceneLabelWidth, 300);
  }

  // ────── Ambient sound: a soft low drone on a lowpass ──────
  // Starts off. WebAudio requires a user gesture to play, so we init on first toggle.
  let audioCtx = null, masterGain = null, audioReady = false, soundOn = false;

  function initAudio() {
    if (audioReady) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return; // no WebAudio available; sound silently unavailable
    audioCtx = new AC();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);

    const lp = audioCtx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 900;
    lp.Q.value = 0.3;
    lp.connect(masterGain);

    // A low triad: A2, E3, A3, E4 — sustained, lightly detuned
    const freqs   = [110, 164.8, 220, 329.6];
    const weights = [1.0, 0.55, 0.35, 0.2];
    for (let i = 0; i < freqs.length; i++) {
      const osc = audioCtx.createOscillator();
      osc.type = "sine";
      osc.frequency.value = freqs[i];
      osc.detune.value = (i - 1.5) * 3;
      const g = audioCtx.createGain();
      g.gain.value = weights[i] * 0.3;
      osc.connect(g); g.connect(lp);
      osc.start();
    }
    audioReady = true;
  }

  async function setSound(on) {
    if (on) {
      initAudio();
      if (audioReady && audioCtx.state === "suspended") { try { await audioCtx.resume(); } catch {} }
    }
    if (audioReady) {
      const now = audioCtx.currentTime;
      const target = on ? 0.022 : 0; // peak very low (~-33 dBFS)
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(target, now + 3.5);
    }
    soundOn = on;
    const btn = document.getElementById("btn-sound");
    btn.classList.toggle("knob-on", on);
    btn.setAttribute("aria-pressed", String(on));
  }

  function cycleScene() {
    const i = SCENE_ORDER.indexOf(currentScene);
    currentScene = SCENE_ORDER[(i + 1) % SCENE_ORDER.length];
    localStorage.setItem("within_scene", currentScene);
    updateSceneLabel();
  }

  // Knob wiring — stop propagation so clicks don't also start a Minute
  document.getElementById("btn-sound").addEventListener("pointerdown", (e) => e.stopPropagation());
  document.getElementById("btn-scene").addEventListener("pointerdown", (e) => e.stopPropagation());
  document.getElementById("btn-sound").addEventListener("click", (e) => {
    e.stopPropagation();
    setSound(!soundOn);
  });
  document.getElementById("btn-scene").addEventListener("click", (e) => {
    e.stopPropagation();
    cycleScene();
  });

  function canStart() { return state === S.AMBIENT || state === S.INVITED; }

  function startMinute() {
    if (!canStart()) return;
    clearTimeout(invitationTimer);
    if (typeof wordsPanelOpen !== "undefined" && wordsPanelOpen) closeWordsPanel();
    setState(S.MINUTE);
    runMinute();
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === " " && canStart()) {
      e.preventDefault();
      startMinute();
    } else if (state === S.LEAVE) {
      if (e.key === "Enter") { e.preventDefault(); submitWord(); }
      else if (e.key === "Escape") { e.preventDefault(); quietReturn(); }
    }
  });

  document.addEventListener("pointerdown", (e) => {
    if (e.target.closest("input")) return;
    if (canStart()) startMinute();
  });

  // ────── The Minute ──────
  async function runMinute() {
    // Pick a word for the Minute
    const seed = hashString(dayKey() + ":" + Math.floor(Date.now() / 60000));
    const minuteWord = wordPool[seed % wordPool.length];
    els.breathWord.textContent = minuteWord;
    els.breathWord.style.opacity = "0";

    const start = performance.now();
    const cycleMs = 10000;  // 4s in, 6s out
    const totalMs = 60000;
    const wordIn   = 20000;
    const wordHold = 28000;
    const wordOut  = 44000;

    const R_MIN = 38, R_MAX = 84;

    function tick() {
      if (state !== S.MINUTE) return; // user left early
      const now = performance.now();
      const elapsed = now - start;

      if (elapsed >= totalMs) {
        els.breathCircle.setAttribute("r", R_MIN.toFixed(2));
        els.breathWord.style.opacity = "0";
        leaveAWord();
        return;
      }

      const phase = (elapsed % cycleMs) / cycleMs;
      let r;
      if (phase < 0.40) {
        // inhale
        r = lerp(R_MIN, R_MAX, easeInOutSine(phase / 0.40));
      } else if (phase < 0.50) {
        // dwell full
        r = R_MAX;
      } else if (phase < 0.95) {
        // exhale
        r = lerp(R_MAX, R_MIN, easeInOutSine((phase - 0.50) / 0.45));
      } else {
        // dwell empty
        r = R_MIN;
      }
      els.breathCircle.setAttribute("r", r.toFixed(2));

      // Word fade in/hold/out
      let wo;
      if (elapsed < wordIn)        wo = 0;
      else if (elapsed < wordHold) wo = easeInOutSine((elapsed - wordIn) / (wordHold - wordIn));
      else if (elapsed < wordOut)  wo = 1;
      else                         wo = 1 - easeInOutSine((elapsed - wordOut) / (totalMs - wordOut));
      els.breathWord.style.opacity = String(wo * 0.82);

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  // ────── Leave a word ──────
  const LEAVE_IDLE_MS = 25000; // if untouched for this long, fade quietly back
  let leaveIdleTimer = null;
  function bumpLeaveIdle() {
    clearTimeout(leaveIdleTimer);
    leaveIdleTimer = setTimeout(() => {
      if (state === S.LEAVE) quietReturn();
    }, LEAVE_IDLE_MS);
  }

  function leaveAWord() {
    setState(S.LEAVE);
    setTimeout(() => els.wordInput.focus({ preventScroll: true }), 700);
    bumpLeaveIdle();
  }

  function submitWord() {
    clearTimeout(leaveIdleTimer);
    const v = (els.wordInput.value || "").trim().toLowerCase();
    if (!v) return quietReturn();
    renderStill(v);
  }

  // A "soft" return: no mark saved, no Still — just fade back to ambient.
  // Used for Escape, empty submit, and the idle timeout.
  function quietReturn() {
    clearTimeout(leaveIdleTimer);
    els.wordInput.value = "";
    setState(S.AMBIENT);
    scheduleInvitation();
  }

  // Reset the idle timer on every keystroke in the input
  els.wordInput.addEventListener("input", () => {
    if (state === S.LEAVE) bumpLeaveIdle();
  });

  // ────── The Still ──────
  function renderStill(seedSource) {
    setState(S.STILL);
    const seed = hashString(seedSource + ":" + dayKey() + ":" + new Date().getHours());
    saveMark({ seed, word: seedSource, t: Date.now() });
    freshSeed = seed;
    freshBornAt = performance.now();
    refreshWordsKnob();

    // After the still holds, return to ambient
    setTimeout(() => {
      els.wordInput.value = "";
      setState(S.AMBIENT);
      scheduleInvitation();
    }, STILL_HOLD_MS);
  }

  // ────── Tab visibility: pause invitation timing while hidden ──────
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      clearTimeout(invitationTimer);
    } else if (state === S.AMBIENT) {
      scheduleInvitation();
    }
  });

  // ────── Words knob: reveal the collection of kept words for today ──────
  document.querySelector("#btn-words .label").textContent = STRINGS[LANG].words;
  let wordsPanelOpen = false;

  function loadKeptWords() {
    // Return the user's kept words for today, oldest first.
    return loadMarks().map((m) => m.word).filter((w) => typeof w === "string" && w.length && !w.startsWith(":"));
  }

  function refreshWordsKnob() {
    const words = loadKeptWords();
    const btn = document.getElementById("btn-words");
    const sep = document.getElementById("sep-words");
    const show = words.length > 0;
    btn.hidden = !show;
    sep.hidden = !show;
    if (!show) {
      closeWordsPanel();
    } else if (wordsPanelOpen) {
      renderWordsPanel(); // content may have grown
    }
  }

  function renderWordsPanel() {
    const panel = document.getElementById("words-panel");
    const words = loadKeptWords();
    panel.innerHTML = "";
    for (const w of words) {
      const el = document.createElement("span");
      el.className = "w";
      el.textContent = w;
      panel.appendChild(el);
    }
  }

  function openWordsPanel() {
    const panel = document.getElementById("words-panel");
    renderWordsPanel();
    panel.hidden = false;
    wordsPanelOpen = true;
    document.getElementById("btn-words").classList.add("knob-on");
    document.getElementById("btn-words").setAttribute("aria-pressed", "true");
    requestAnimationFrame(() => panel.classList.add("visible"));
  }

  function closeWordsPanel() {
    const panel = document.getElementById("words-panel");
    wordsPanelOpen = false;
    panel.classList.remove("visible");
    document.getElementById("btn-words").classList.remove("knob-on");
    document.getElementById("btn-words").setAttribute("aria-pressed", "false");
    setTimeout(() => { if (!wordsPanelOpen) panel.hidden = true; }, 1300);
  }

  function toggleWordsPanel() {
    wordsPanelOpen ? closeWordsPanel() : openWordsPanel();
  }

  document.getElementById("btn-words").addEventListener("pointerdown", (e) => e.stopPropagation());
  document.getElementById("btn-words").addEventListener("click", (e) => {
    e.stopPropagation();
    toggleWordsPanel();
  });

  // Initial paint
  refreshWordsKnob();

  // ────── Dev hook (kept for the prototype; harmless) ──────
  if (new URLSearchParams(location.search).has("dev")) {
    window.__within = { setState, renderStill, submitWord, quietReturn, startMinute, S, refreshWordsKnob, freshSeedPeek: () => freshSeed };
  }
</script>
</body>
</html>

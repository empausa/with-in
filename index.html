<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="w/in — a quiet minute." />
<title>within</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: rgb(70, 60, 55);
    --halo: rgba(245, 238, 227, 0.45); /* soft backdrop behind text, polarity follows --ink */
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --slow: 1400ms;
    --slower: 2200ms;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: "Fraunces", "EB Garamond", Georgia, "Times New Roman", serif;
    font-weight: 300;
    font-style: italic;
    color: var(--ink);
    background: #f5ede3;
    /* Layered text halo — inherits to all descendants. Pulls text off the
       gradient at transitional hours where fg/bg luminance can get close. */
    text-shadow:
      0 0 2px var(--halo),
      0 0 10px var(--halo),
      0 0 22px var(--halo),
      0 0 44px var(--halo);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    inset: 0;
    user-select: none;
    -webkit-user-select: none;
  }

  #field {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem;
    width: 100%;
    max-width: 640px;
  }

  /* The mark: w/in — now a small quiet identity at the left of the knobs bar.
     Same horizontal padding as .knob so the gap between the mark and its
     neighbour separator matches the gap between a knob and its separator.
     No breath animation (per design choice to keep the bar still). */
  #mark {
    font-size: 1rem;
    font-weight: 300;
    font-style: italic;
    letter-spacing: -0.02em;
    line-height: 1;
    display: inline-flex;
    align-items: baseline;
    padding: 0.2em 0.82rem; /* 0.82rem matches a .knob's horizontal padding (1em at 0.82rem font) */
    opacity: 0.72;
    transition: opacity var(--slower) var(--ease);
    user-select: none;
  }
  #mark-inner {
    display: inline-flex;
    align-items: baseline;
  }
  #mark .slash {
    font-weight: 200;
    opacity: 0.5;
    margin: 0 0.04em;
    transform: translateY(-0.06em) rotate(2deg);
    display: inline-block;
  }

  /* The invitations — a column of quiet lines, one per experiment */
  #invitations {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.1em;
    margin: 0;
    padding: 0;
  }
  .invitation {
    background: transparent;
    border: none;
    font: inherit;
    color: inherit;
    font-size: 1.05rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.02em;
    padding: 0.2em 0.8em;
    cursor: pointer;
    opacity: 0;
    transition: opacity var(--slower) var(--ease);
    user-select: none;
  }
  .invitation:hover,
  .invitation:focus-visible {
    opacity: 0.9 !important;
    outline: none;
  }

  /* The breath */
  #breath {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--slower) var(--ease);
  }
  #breath svg {
    width: min(70vw, 70vh, 420px);
    height: min(70vw, 70vh, 420px);
    overflow: visible;
  }
  #breath-circle {
    fill: none;
    stroke: currentColor;
    stroke-width: 0.6;
    opacity: 0.55;
  }
  #breath-word {
    position: absolute;
    font-size: clamp(1.1rem, 2.3vw, 1.55rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.01em;
    margin: 0;
    opacity: 0;
    pointer-events: none;
    will-change: opacity;
  }

  /* The leave-word prompt */
  #leave {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--slower) var(--ease);
  }
  #leave .prompt {
    font-size: 1.15rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.01em;
    opacity: 0.7;
    margin: 0;
    text-align: center;
    line-height: 1.5;
  }
  #word-input {
    background: transparent;
    border: none;
    outline: none;
    font: inherit;
    font-size: clamp(1.4rem, 3vw, 1.9rem);
    font-style: italic;
    font-weight: 300;
    text-align: center;
    color: inherit;
    caret-color: currentColor;
    width: min(10em, 70vw);
    padding: 0.4em 0;
    border: none;
    border-bottom: 1px solid currentColor;
    border-bottom-color: color-mix(in srgb, currentColor 30%, transparent);
    opacity: 0.7;
    transition: opacity var(--slow) var(--ease), border-color var(--slow) var(--ease);
  }
  #word-input:focus {
    opacity: 1;
    border-bottom-color: color-mix(in srgb, currentColor 55%, transparent);
  }
  #word-input::placeholder { color: currentColor; opacity: 0.25; font-style: italic; }

  /* Kept in today */
  #kept,
  #rest-line,
  #stone-hint {
    position: absolute;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.95rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.03em;
    opacity: 0;
    margin: 0;
    transition: opacity var(--slower) var(--ease);
    pointer-events: none;
  }
  /* The stone hint sits higher — above where the stone is drawn */
  #stone-hint {
    bottom: auto;
    top: 28vh;
  }

  /* State-driven visibility — dual attributes on <body>:
     data-experiment: "none" | "minute" | "gaze"   (null when on home)
     data-home:       "ambient" | "invited"         (only meaningful when experiment="none")
     data-step:       "breath" | "leave-word" | "still" | "gaze" | "gaze-rest"
  */

  /* The mark lives inside .knobs now, so it rides on the bar's visibility rules.
     No per-state opacity override needed here. */

  /* Invitations visible when home reaches "invited" — more faded since they're
     the center of the page now; hover still lifts to 0.9 via the base rule. */
  body[data-experiment="none"][data-home="invited"] .invitation { opacity: 0.32; }

  /* Breath SVG is visible only during Minute's breath step */
  body[data-step="breath"] #breath { opacity: 1; }

  /* Leave prompt visible during the leave-word step */
  body[data-step="leave-word"] #leave { opacity: 1; pointer-events: auto; }

  /* Kept line shows briefly during the still step */
  body[data-step="still"]     #kept      { opacity: 0.75; }
  /* Rest line shows briefly at the end of a Gaze */
  body[data-step="gaze-rest"] #rest-line { opacity: 0.75; }
  /* Stone hint: "hold" while waiting, "let go" on release */
  body[data-step="stone-wait"]    #stone-hint { opacity: 0.7; }
  body[data-step="stone-release"] #stone-hint { opacity: 0.7; }

  /* Discreet knobs at the bottom — present, never loud */
  .knobs {
    position: fixed;
    bottom: clamp(1.25rem, 3.5vh, 2.6rem);
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    align-items: baseline;
    gap: 0.9rem;
    font-size: 0.82rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.02em;
    color: inherit;
    opacity: 0.28;
    transition: opacity 1.2s var(--ease);
    pointer-events: auto;
    user-select: none;
  }
  .knobs:hover,
  .knobs:focus-within { opacity: 0.7; }

  .knob {
    background: transparent;
    border: none;
    /* Horizontal padding reserves room for the dot on either side.
       Every knob has it — so the label is always centered in its button,
       and the rhythm between knobs is symmetric whether a dot is present or not. */
    padding: 0.2em 1em;
    font: inherit;
    color: inherit;
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.8s var(--ease);
    position: relative;
    display: inline-flex;
    align-items: baseline;
    justify-content: center;
  }
  .knob:hover,
  .knob:focus-visible { opacity: 1; outline: none; }
  .knob .dot {
    position: absolute;
    left: 0.35em;
    top: 50%;
    width: 0.36em;
    height: 0.36em;
    border-radius: 50%;
    background: currentColor;
    opacity: 0;
    transform: translate(0, -50%);
    transition: opacity 0.8s var(--ease);
  }
  .knob.knob-on .dot { opacity: 0.7; }
  .knob .label { transition: color 0.8s var(--ease); }
  /* Scene label locks to a slot wide enough for the longest scene name —
     so cycling doesn't shift the whole bar. Text stays centered in its slot. */
  #btn-scene .label {
    display: inline-block;
    text-align: center;
  }
  .knob-sep { opacity: 0.35; }

  /* Knobs vanish during any experiment */
  body[data-experiment="minute"] .knobs,
  body[data-experiment="gaze"]   .knobs {
    opacity: 0;
    pointer-events: none;
  }

  /* Clock — a quiet hour/minute readout aligned with the knobs bar */
  .clock {
    position: fixed;
    bottom: clamp(1.25rem, 3.5vh, 2.6rem);
    right: clamp(1.2rem, 3vw, 2.2rem);
    margin: 0;
    padding: 0.2em 0;
    font-size: 0.82rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.02em;
    color: inherit;
    opacity: 0.28;
    transition: opacity var(--slower) var(--ease);
    z-index: 2;
    user-select: none;
    font-variant-numeric: tabular-nums; /* keep digit widths stable */
  }
  .clock:hover,
  .clock:focus-visible { opacity: 0.7; outline: none; }
  /* Mirror the knobs' hide-during-experiment rule */
  body[data-experiment="minute"] .clock,
  body[data-experiment="gaze"]   .clock {
    opacity: 0;
    pointer-events: none;
  }

  /* Words panel — the column of kept words, revealed above the knobs */
  .words-panel {
    position: fixed;
    bottom: calc(clamp(1.25rem, 3.5vh, 2.6rem) + 2.8em);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.05em;
    font-size: 0.98rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.01em;
    color: inherit;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s var(--ease);
    z-index: 2;
    text-align: center;
    max-height: 60vh;
    overflow: hidden;
  }
  .words-panel.visible { opacity: 0.72; }
  .words-panel .w {
    display: block;
    line-height: 1.55;
    transition: opacity 0.8s var(--ease);
  }
  body[data-experiment="minute"] .words-panel,
  body[data-experiment="gaze"]   .words-panel {
    opacity: 0 !important;
    pointer-events: none;
  }

  @media (prefers-reduced-motion: reduce) {
    #mark { animation: none; }
  }

  @media (max-width: 640px) {
    .knobs { font-size: 0.78rem; gap: 0.7rem; }
    #mark { font-size: 0.95rem; }
  }
  /* On narrow screens, the knobs bar can grow wide enough to collide with
     the clock at the bottom-right. Lift the clock to its own centered row
     just above the bar, preserving the "bottom strip" feel. */
  @media (max-width: 560px) {
    .clock {
      right: auto;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(clamp(1.25rem, 3.5vh, 2.6rem) + 2.2em);
    }
  }
</style>
</head>
<body data-home="ambient" data-experiment="none" data-step="">
  <canvas id="field" aria-hidden="true"></canvas>
  <main>
    <div id="invitations" aria-label="experiments"></div>
    <div id="breath" aria-hidden="true">
      <svg viewBox="-100 -100 200 200" preserveAspectRatio="xMidYMid meet">
        <circle id="breath-circle" cx="0" cy="0" r="38" />
      </svg>
      <p id="breath-word"></p>
    </div>
    <div id="leave">
      <p class="prompt">leave a word, or close your eyes and go</p>
      <input id="word-input" type="text" maxlength="16" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text" aria-label="a word" />
    </div>
    <p id="kept">kept in today</p>
    <p id="rest-line">rest.</p>
    <p id="stone-hint"></p>
  </main>
  <div id="words-panel" class="words-panel" aria-hidden="true" hidden></div>
  <nav class="knobs" aria-label="controls">
    <div id="mark" aria-label="within">
      <span id="mark-inner"><span class="w">w</span><span class="slash">/</span><span class="in">in</span></span>
    </div>
    <span class="knob-sep" aria-hidden="true">·</span>
    <button id="btn-sound" class="knob" type="button" aria-pressed="false">
      <span class="dot" aria-hidden="true"></span><span class="label">sound</span>
    </button>
    <span class="knob-sep" aria-hidden="true">·</span>
    <button id="btn-scene" class="knob" type="button">
      <span class="label">breath</span>
    </button>
    <span id="sep-words" class="knob-sep" aria-hidden="true" hidden>·</span>
    <button id="btn-words" class="knob" type="button" aria-pressed="false" hidden>
      <span class="dot" aria-hidden="true"></span><span class="label">words</span>
    </button>
  </nav>
  <p id="clock" class="clock" aria-label="time"></p>

<script type="module">
  "use strict";

  // ────── States ──────
  // Legacy S enum removed — state now lives on body dataset via setHome/setExperiment/setStep

  // ────── Utils ──────
  const lerp  = (a, b, t) => a + (b - a) * t;
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const easeInOutSine = t => 0.5 - 0.5 * Math.cos(Math.PI * clamp(t, 0, 1));
  const easeOutCubic  = t => 1 - Math.pow(1 - clamp(t, 0, 1), 3);

  const lerpColor = (a, b, t) => [lerp(a[0], b[0], t), lerp(a[1], b[1], t), lerp(a[2], b[2], t)];
  const rgba = (c, a = 1) => `rgba(${(c[0]*255)|0}, ${(c[1]*255)|0}, ${(c[2]*255)|0}, ${a})`;
  const rgb  = (c) => rgba(c, 1);

  function hashString(s) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
    }
    return h;
  }
  function mulberry32(seed) {
    let s = seed >>> 0;
    return function () {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const now = () => new Date();
  // Dev override: `?hour=6.5` locks the displayed hour for testing the palette.
  const _urlHour = new URLSearchParams(location.search).get("hour");
  const hourFrac = _urlHour !== null
    ? () => ((parseFloat(_urlHour) % 24) + 24) % 24
    : () => { const d = now(); return d.getHours() + d.getMinutes() / 60 + d.getSeconds() / 3600; };
  const dayKey = () => { const d = now(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; };

  // ────── Palette (time-mapped) ──────
  // bg = [top color, bottom color]; accent = glow color; ink = text/stroke color
  // ink field is unused (we derive ink from bg luminance at runtime); kept for future tuning
  const K = [
    { h: 0,   bg: [[0.11,0.11,0.20],[0.06,0.07,0.14]], accent: [0.47,0.46,0.62] },
    { h: 5,   bg: [[0.18,0.16,0.26],[0.23,0.18,0.24]], accent: [0.62,0.48,0.52] },
    { h: 6.6, bg: [[0.28,0.22,0.30],[0.38,0.28,0.32]], accent: [0.70,0.52,0.50] }, // pre-dawn glow, still dim
    { h: 7,   bg: [[0.93,0.82,0.80],[0.97,0.93,0.88]], accent: [0.80,0.63,0.59] }, // full dawn lift
    { h: 11,  bg: [[0.97,0.94,0.89],[0.98,0.96,0.92]], accent: [0.85,0.72,0.58] },
    { h: 14,  bg: [[0.97,0.93,0.87],[0.96,0.91,0.84]], accent: [0.82,0.68,0.52] },
    { h: 17,  bg: [[0.92,0.77,0.62],[0.82,0.53,0.41]], accent: [0.66,0.37,0.28] },
    { h: 18.6,bg: [[0.62,0.38,0.40],[0.50,0.30,0.38]], accent: [0.60,0.35,0.35] }, // late dusk, lower-mid
    { h: 19,  bg: [[0.34,0.24,0.34],[0.22,0.18,0.30]], accent: [0.52,0.40,0.50] }, // evening, darker
    { h: 21,  bg: [[0.20,0.19,0.32],[0.12,0.13,0.22]], accent: [0.50,0.50,0.66] },
    { h: 24,  bg: [[0.11,0.11,0.20],[0.06,0.07,0.14]], accent: [0.47,0.46,0.62] },
  ];

  function getPalette() {
    const h = hourFrac();
    let i = 0;
    while (i < K.length - 1 && K[i + 1].h <= h) i++;
    const a = K[i], b = K[i + 1] || K[0];
    const span = (b.h - a.h) || 1;
    const t = easeInOutSine((h - a.h) / span);
    return {
      bg: [lerpColor(a.bg[0], b.bg[0], t), lerpColor(a.bg[1], b.bg[1], t)],
      accent: lerpColor(a.accent, b.accent, t),
      ink: INK_DARK, // placeholder; updatePalette() will set the real ink from luminance
    };
  }

  // Derive ink + halo from the current bg luminance so text always contrasts
  // cleanly, regardless of the scene layer on top. Mutates pal.ink so canvas
  // functions that use pal.ink stay in sync with CSS.
  function smoothstep(e0, e1, x) {
    const t = clamp((x - e0) / (e1 - e0), 0, 1);
    return t * t * (3 - 2 * t);
  }
  const INK_LIGHT = [0.96, 0.93, 0.87];   // near-white warm for dark backgrounds
  const INK_DARK  = [0.12, 0.10, 0.08];   // near-black warm for light backgrounds
  const HALO_LIGHT = [0.99, 0.97, 0.93];  // pale halo behind dark text
  const HALO_DARK  = [0.04, 0.03, 0.07];  // inky halo behind light text
  const INK_LIGHT_LUM = 0.299*INK_LIGHT[0] + 0.587*INK_LIGHT[1] + 0.114*INK_LIGHT[2];
  const INK_DARK_LUM  = 0.299*INK_DARK[0]  + 0.587*INK_DARK[1]  + 0.114*INK_DARK[2];

  function updatePalette(pal) {
    // Use the midpoint of the two bg stops as the luminance reference.
    const base = [
      (pal.bg[0][0] + pal.bg[1][0]) / 2,
      (pal.bg[0][1] + pal.bg[1][1]) / 2,
      (pal.bg[0][2] + pal.bg[1][2]) / 2,
    ];
    const lum = 0.299 * base[0] + 0.587 * base[1] + 0.114 * base[2];
    // Pick whichever ink polarity has greater luminance distance from bg —
    // guaranteed maximum contrast. Smooth only within a 2% band around the
    // crossover so ink never lingers at a midtone that matches the bg.
    const darkContrast  = Math.abs(INK_DARK_LUM  - lum);
    const lightContrast = Math.abs(INK_LIGHT_LUM - lum);
    const crossover = (INK_LIGHT_LUM + INK_DARK_LUM) / 2; // midpoint between the two inks
    const t = smoothstep(crossover - 0.01, crossover + 0.01, lum);
    // t = 0 → use LIGHT ink (bg is dark-side); t = 1 → use DARK ink.
    const ink = lerpColor(INK_LIGHT, INK_DARK, t);
    const halo = lerpColor(HALO_DARK, HALO_LIGHT, t);
    // Halo alpha rises at midtones (where contrast is weakest).
    const midtoneBoost = 1 - Math.abs(2 * lum - 1);
    const haloAlpha = 0.35 + 0.55 * midtoneBoost;
    document.documentElement.style.setProperty("--ink", rgb(ink));
    document.documentElement.style.setProperty("--halo", rgba(halo, haloAlpha));
    pal.ink = ink;
  }

  // ────── Marks (persisted for today) ──────
  const MARK_KEY = () => "within_marks_" + dayKey();
  function loadMarks() {
    try { return JSON.parse(localStorage.getItem(MARK_KEY()) || "[]"); } catch { return []; }
  }
  function saveMark(m) {
    const marks = loadMarks();
    marks.push(m);
    const trimmed = marks.slice(-12);
    localStorage.setItem(MARK_KEY(), JSON.stringify(trimmed));
    return trimmed;
  }
  function cleanupOldMarks() {
    const keep = MARK_KEY();
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.startsWith("within_marks_") && k !== keep) localStorage.removeItem(k);
    }
  }
  cleanupOldMarks();

  // ────── Canvas Field ──────
  const field = document.getElementById("field");
  const ctx = field.getContext("2d");
  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = Math.floor(window.innerWidth  * DPR);
    H = Math.floor(window.innerHeight * DPR);
    field.width  = W;
    field.height = H;
    field.style.width  = window.innerWidth  + "px";
    field.style.height = window.innerHeight + "px";
  }
  window.addEventListener("resize", resize);
  resize();

  let freshSeed = null;
  let freshBornAt = 0; // ms
  const STILL_HOLD_MS = 9000;

  // ────── Scenes: three ways the palette moves ──────
  // Each scene is a middle layer painted over the base gradient,
  // using the same time-aware palette. Marks render above all scenes.
  const SCENE_ORDER = ["breath", "tide", "lights"];

  function drawBreathScene(t, pal) {
    const d1x = W * (0.5 + 0.18 * Math.sin(t * 0.035));
    const d1y = H * (0.42 + 0.14 * Math.cos(t * 0.028));
    const r1 = Math.min(W, H) * 0.65;
    const rg1 = ctx.createRadialGradient(d1x, d1y, 0, d1x, d1y, r1);
    rg1.addColorStop(0, rgba(pal.accent, 0.11));
    rg1.addColorStop(0.7, rgba(pal.accent, 0.02));
    rg1.addColorStop(1, rgba(pal.accent, 0));
    ctx.fillStyle = rg1;
    ctx.fillRect(0, 0, W, H);

    const d2x = W * (0.48 - 0.16 * Math.sin(t * 0.025 + 1));
    const d2y = H * (0.55 + 0.12 * Math.cos(t * 0.021 + 0.7));
    const r2 = Math.min(W, H) * 0.58;
    const rg2 = ctx.createRadialGradient(d2x, d2y, 0, d2x, d2y, r2);
    rg2.addColorStop(0, rgba(pal.bg[0], 0.22));
    rg2.addColorStop(1, rgba(pal.bg[0], 0));
    ctx.fillStyle = rg2;
    ctx.fillRect(0, 0, W, H);
  }

  function drawTideScene(t, pal) {
    // Two soft horizontal bands drift up and down — like light on water
    const c1 = H * (0.5 + 0.28 * Math.sin(t * 0.024));
    const h1 = H * 0.28;
    const g1 = ctx.createLinearGradient(0, c1 - h1, 0, c1 + h1);
    g1.addColorStop(0, rgba(pal.accent, 0));
    g1.addColorStop(0.5, rgba(pal.accent, 0.13));
    g1.addColorStop(1, rgba(pal.accent, 0));
    ctx.fillStyle = g1;
    ctx.fillRect(0, 0, W, H);

    const c2 = H * (0.5 + 0.34 * Math.cos(t * 0.019 + 1.3));
    const h2 = H * 0.34;
    const g2 = ctx.createLinearGradient(0, c2 - h2, 0, c2 + h2);
    g2.addColorStop(0, rgba(pal.bg[0], 0));
    g2.addColorStop(0.5, rgba(pal.bg[0], 0.22));
    g2.addColorStop(1, rgba(pal.bg[0], 0));
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, W, H);
  }

  function drawLightsScene(t, pal) {
    // Several small points drift in slow ellipses — motes of light
    const count = 9;
    const m = Math.min(W, H);
    for (let i = 0; i < count; i++) {
      const homeX = W * (0.12 + ((i * 0.137) % 0.76));
      const homeY = H * (0.12 + ((i * 0.281) % 0.76));
      const ew = m * 0.13;
      const eh = m * 0.09;
      const phase = i * 1.37;
      const x = homeX + ew * Math.sin(t * 0.02 * (0.7 + (i % 3) * 0.15) + phase);
      const y = homeY + eh * Math.cos(t * 0.018 * (0.7 + ((i * 2) % 3) * 0.15) + phase);
      const r = m * 0.07;
      const color = (i % 2 === 0) ? pal.accent : pal.bg[0];
      const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
      rg.addColorStop(0, rgba(color, 0.18));
      rg.addColorStop(0.5, rgba(color, 0.05));
      rg.addColorStop(1, rgba(color, 0));
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);
    }
  }

  const SCENES = {
    breath: drawBreathScene,
    tide:   drawTideScene,
    lights: drawLightsScene,
  };

  let currentScene = localStorage.getItem("within_scene") || "breath";
  if (!SCENES[currentScene]) currentScene = "breath";

  function drawBloom(seed, intensity, pal) {
    const rnd = mulberry32(seed);
    const cx = (0.25 + rnd() * 0.5) * W;
    const cy = (0.28 + rnd() * 0.45) * H;
    const base = Math.min(W, H) * 0.28;
    const blobs = 5;
    for (let i = 0; i < blobs; i++) {
      const ox = (rnd() - 0.5) * base * 1.2;
      const oy = (rnd() - 0.5) * base * 1.2;
      const r = base * (0.55 + rnd() * 0.9);
      const mix = rnd();
      const c = mix < 0.55 ? pal.accent : pal.bg[0];
      const rg = ctx.createRadialGradient(cx + ox, cy + oy, 0, cx + ox, cy + oy, r);
      rg.addColorStop(0, rgba(c, 0.22 * intensity));
      rg.addColorStop(0.6, rgba(c, 0.06 * intensity));
      rg.addColorStop(1, rgba(c, 0));
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawField(tMs) {
    const pal = getPalette();
    updatePalette(pal);

    // Base vertical gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, rgb(pal.bg[0]));
    g.addColorStop(1, rgb(pal.bg[1]));
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Scene layer (current choice)
    const t = tMs / 1000;
    SCENES[currentScene](t, pal);

    // Persisted marks — ghost blooms
    const marks = loadMarks();
    for (const m of marks) {
      drawBloom(m.seed, 0.55, pal);
    }

    // Fresh bloom — louder, then ease back
    if (freshSeed !== null) {
      const age = performance.now() - freshBornAt;
      const t01 = clamp(age / STILL_HOLD_MS, 0, 1);
      const boost = lerp(1.6, 0.0, easeOutCubic(t01)); // extra on top of ghost
      if (boost > 0.01) drawBloom(freshSeed, boost, pal);
      if (t01 >= 1) freshSeed = null;
    }

    // Active experiment's own layer (e.g., Gaze light), if any
    if (currentExperiment) {
      const exp = EXPERIMENTS.find((e) => e.id === currentExperiment);
      if (exp && exp.draw) exp.draw(t, pal);
    }

    // rAF when visible (smooth); setTimeout when hidden (keeps state
    // correct for headless screenshots + background tabs).
    if (document.visibilityState === "visible") {
      requestAnimationFrame(drawField);
    } else {
      setTimeout(() => drawField(performance.now()), 120);
    }
  }
  // First paint is kicked off at the very bottom of the module, once all
  // state/registry declarations are initialized (see bottom of this script).

  // ────── UI refs ──────
  const els = {
    body: document.body,
    mark: document.getElementById("mark"),
    invitations: document.getElementById("invitations"),
    breath: document.getElementById("breath"),
    breathCircle: document.getElementById("breath-circle"),
    breathWord: document.getElementById("breath-word"),
    leave: document.getElementById("leave"),
    wordInput: document.getElementById("word-input"),
    kept: document.getElementById("kept"),
    restLine: document.getElementById("rest-line"),
  };

  // ────── State model ──────
  // Three orthogonal axes, mirrored to body dataset so CSS can select them.
  //   home:       "ambient" | "invited"    (only meaningful when experiment === null)
  //   experiment: null | "minute" | "gaze" (which experiment is currently running)
  //   step:       ""  | "breath" | "leave-word" | "still" | "gaze" | "gaze-rest"
  let currentHome = "ambient";
  let currentExperiment = null;
  let currentStep = "";

  function setHome(h) {
    currentHome = h;
    els.body.dataset.home = h;
  }
  function setExperiment(id) {
    currentExperiment = id;
    els.body.dataset.experiment = id || "none";
  }
  function setStep(s) {
    currentStep = s || "";
    els.body.dataset.step = s || "";
  }
  function isHome() { return currentExperiment === null; }

  // Returning home: clears experiment + step, resets home to ambient, reschedules invitation.
  function goHome() {
    setExperiment(null);
    setStep("");
    setHome("ambient");
    scheduleInvitation();
  }

  // Entering an experiment: preserved invariant — only from home.
  function enterExperiment(id) {
    if (!isHome()) return;
    const exp = EXPERIMENTS.find((e) => e.id === id);
    if (!exp) return;
    clearTimeout(invitationTimer);
    if (typeof wordsPanelOpen !== "undefined" && wordsPanelOpen) closeWordsPanel();
    setExperiment(id);
    exp.enter();
  }

  // ────── Experiments registry ──────
  // Each experiment: id, a label function (read lazily so it follows LANG),
  // an enter handler that starts its internal flow, and an optional draw(t, pal)
  // hook called from drawField when the experiment is active.
  // runMinute / gazeStart / gazeDraw / gazeCancel are defined further down.
  const EXPERIMENTS = [
    {
      id: "minute",
      label: () => STRINGS[LANG].experiments.minute,
      enter: () => runMinute(),
    },
    {
      id: "gaze",
      label: () => STRINGS[LANG].experiments.gaze,
      enter: () => gazeStart(),
      draw:  (t, pal) => gazeDraw(t, pal),
    },
    {
      id: "stone",
      label: () => STRINGS[LANG].experiments.stone,
      enter: () => stoneStart(),
      draw:  (t, pal) => stoneDraw(t, pal),
    },
  ];

  // ────── Ambient → Invited ──────
  let invitationTimer = null;
  function scheduleInvitation() {
    clearTimeout(invitationTimer);
    invitationTimer = setTimeout(() => {
      if (isHome() && currentHome === "ambient") setHome("invited");
    }, 2000);
  }
  scheduleInvitation();

  // ────── Language ──────
  // Detect from browser default; "pt-*" gets Portuguese, anything else gets English.
  // `?lang=pt` or `?lang=en` overrides for dev/testing.
  const urlLang = new URLSearchParams(location.search).get("lang");
  const LANG = ((urlLang || navigator.language || "en").toLowerCase().startsWith("pt")) ? "pt" : "en";
  document.documentElement.lang = LANG;

  const STRINGS = {
    en: {
      experiments: { minute: "take a minute", gaze: "a gaze", stone: "a stone" },
      prompt: "leave a word, or close your eyes and go",
      kept: "kept in today",
      rest: "rest.",
      stone: { hold: "hold", let: "let go" },
      sounds: { silent: "silent", hum: "hum", wind: "wind", water: "water" },
      scenes: { breath: "breath", tide: "tide", lights: "lights" },
      words: "words",
    },
    pt: {
      // EU Portuguese, intimate tu-form; chosen for quiet, not protocol
      experiments: { minute: "um minuto para ti", gaze: "um olhar", stone: "uma pedra" },
      prompt: "deixa uma palavra, ou fecha os olhos e vai",
      kept: "guardado hoje",
      rest: "descansa.",
      stone: { hold: "segura", let: "solta" },
      sounds: { silent: "silêncio", hum: "murmúrio", wind: "vento", water: "água" },
      scenes: { breath: "respiro", tide: "maré", lights: "luzes" },
      words: "palavras",
    },
  };

  // ────── Entering the Minute ──────
  // Word pools — not translations. Each language's pool is chosen for the
  // words that carry the feeling in that language, on their own terms.
  const WORD_POOLS = {
    en: [
      "room","thaw","enough","hush","bloom","still","breathe","soft",
      "open","ease","dusk","mend","linger","alight","near","cradle",
      "quiet","slow","home","here","rest","warm","dawn","keep",
    ],
    pt: [
      // Words Portuguese holds on its own — mostly untranslatable, or deeper in PT than in EN.
      "colo",        // the crook of an arm where someone is held
      "sossego",     // the peculiar peace of being unbothered
      "aconchego",   // nestled warmth
      "remanso",     // a still pool in a river
      "manso",       // gentle, unhurried
      "alento",      // a breath that revives
      "madrugada",   // the hours before dawn
      "alvorada",    // first light
      "entardecer",  // the evening falling
      "luar",        // moonlight
      "brisa",       // a small wind
      "ternura",     // tenderness, emotional
      "morada",      // dwelling, old-poetic for home
      "abrigo",      // shelter
      "pousa",       // settles, alights (as a bird does)
      "respira",     // breathe
      "serena",      // serene, clear
      "demora",      // lingers, takes its time
      "perto",       // near
      "devagar",     // slowly
      "agora",       // now
      "fica",        // stay
      "leveza",      // lightness
      "doçura",      // sweetness
    ],
  };
  const wordPool = WORD_POOLS[LANG];

  // Apply strings to the DOM
  document.querySelector("#leave .prompt").textContent = STRINGS[LANG].prompt;
  document.getElementById("kept").textContent = STRINGS[LANG].kept;
  document.getElementById("rest-line").textContent = STRINGS[LANG].rest;
  // Sound label is set lazily by updateSoundLabel() defined with the audio block.

  // Render one invitation per experiment, into #invitations.
  // Each invitation is a <button> for a11y: focusable, keyboard-activatable.
  (function renderInvitations() {
    const host = els.invitations;
    host.innerHTML = "";
    for (const exp of EXPERIMENTS) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "invitation";
      btn.dataset.experimentId = exp.id;
      btn.textContent = exp.label();
      btn.addEventListener("pointerdown", (e) => e.stopPropagation());
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        enterExperiment(exp.id);
      });
      host.appendChild(btn);
    }
  })();
  function updateSceneLabel() {
    document.querySelector("#btn-scene .label").textContent = STRINGS[LANG].scenes[currentScene];
  }
  updateSceneLabel();

  // Lock a cycling knob label to the width of its longest option so cycling
  // doesn't shift the whole bar. Measured after fonts load for accuracy.
  function lockKnobLabelWidth(selector, labels) {
    const label = document.querySelector(selector);
    if (!label) return;
    const original = label.textContent;
    let maxW = 0;
    for (const text of labels) {
      label.textContent = text;
      const w = label.getBoundingClientRect().width;
      if (w > maxW) maxW = w;
    }
    label.textContent = original;
    // Add a hair of padding so italic descenders/ascenders never clip
    label.style.minWidth = (maxW + 2) + "px";
  }
  function lockCyclingLabels() {
    lockKnobLabelWidth("#btn-scene .label", SCENE_ORDER.map((n) => STRINGS[LANG].scenes[n]));
    lockKnobLabelWidth("#btn-sound .label", ["silent", "hum", "wind", "water"].map((k) => STRINGS[LANG].sounds[k]));
  }
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(lockCyclingLabels);
  } else {
    setTimeout(lockCyclingLabels, 300);
  }

  // ────── Ambient sound ──────
  // Three tracks — a hum (sine triad), wind (brown noise), water (pink noise) —
  // all running once audio is initialized. The knob cycles through
  // silent → hum → wind → água → silent, cross-fading between tracks.
  // Starts silent; browser autoplay requires a user gesture to begin.
  const SOUND_ORDER = [null, "hum", "wind", "water"];
  let audioCtx = null;
  let masterGain = null;
  let audioReady = false;
  let currentSound = null;
  const tracks = {}; // populated by initAudio

  // ~4s loops of colored noise. Generating on the fly avoids the weight of a
  // sample file and keeps the single-file vibe.
  function createNoiseBuffer(ctx, color) {
    const len = 4 * ctx.sampleRate;
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    if (color === "pink") {
      // Paul Kellet's pink noise
      let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
      for (let i = 0; i < len; i++) {
        const w = Math.random() * 2 - 1;
        b0 = 0.99886 * b0 + w * 0.0555179;
        b1 = 0.99332 * b1 + w * 0.0750759;
        b2 = 0.96900 * b2 + w * 0.1538520;
        b3 = 0.86650 * b3 + w * 0.3104856;
        b4 = 0.55000 * b4 + w * 0.5329522;
        b5 = -0.7616 * b5 - w * 0.0168980;
        data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + w * 0.5362) * 0.11;
        b6 = w * 0.115926;
      }
    } else if (color === "brown") {
      let last = 0;
      for (let i = 0; i < len; i++) {
        const w = Math.random() * 2 - 1;
        last = (last + 0.02 * w) / 1.02;
        data[i] = last * 3.5;
      }
    } else { // white
      for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    }
    return buf;
  }

  // Each track exposes a `.gain` node used as its fade handle (0 = silent, 1 = active).
  // Inner LFO modulation happens BEFORE the fade gain, so fade=0 means true silence.

  function makeHum(ctx, dest) {
    // Existing low triad: A2, E3, A3, E4 — sustained, lightly detuned, through a lowpass.
    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 900;
    lp.Q.value = 0.3;
    const fadeG = ctx.createGain();
    fadeG.gain.value = 0;
    lp.connect(fadeG);
    fadeG.connect(dest);
    const freqs   = [110, 164.8, 220, 329.6];
    const weights = [1.0, 0.55, 0.35, 0.2];
    for (let i = 0; i < freqs.length; i++) {
      const osc = ctx.createOscillator();
      osc.type = "sine";
      osc.frequency.value = freqs[i];
      osc.detune.value = (i - 1.5) * 3;
      const g = ctx.createGain();
      g.gain.value = weights[i] * 0.3;
      osc.connect(g); g.connect(lp);
      osc.start();
    }
    return { gain: fadeG };
  }

  function makeWind(ctx, dest) {
    // Brown noise → bandpass ~400 Hz → slow LFO gusts → fade.
    const src = ctx.createBufferSource();
    src.buffer = createNoiseBuffer(ctx, "brown");
    src.loop = true;
    const bp = ctx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.value = 400;
    bp.Q.value = 0.6;
    const innerG = ctx.createGain();
    innerG.gain.value = 0.7; // base level; LFO oscillates around this
    const fadeG = ctx.createGain();
    fadeG.gain.value = 0;
    const lfo = ctx.createOscillator();
    lfo.type = "sine";
    lfo.frequency.value = 0.08; // ~12 s per gust cycle
    const lfoG = ctx.createGain();
    lfoG.gain.value = 0.35;
    lfo.connect(lfoG); lfoG.connect(innerG.gain);
    src.connect(bp); bp.connect(innerG); innerG.connect(fadeG); fadeG.connect(dest);
    src.start(); lfo.start();
    return { gain: fadeG };
  }

  function makeWater(ctx, dest) {
    // Pink noise → lowpass ~1200 Hz → slow LFO waves → fade.
    const src = ctx.createBufferSource();
    src.buffer = createNoiseBuffer(ctx, "pink");
    src.loop = true;
    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 1200;
    lp.Q.value = 0.8;
    const innerG = ctx.createGain();
    innerG.gain.value = 0.55;
    const fadeG = ctx.createGain();
    fadeG.gain.value = 0;
    const lfo = ctx.createOscillator();
    lfo.type = "sine";
    lfo.frequency.value = 0.05; // ~20 s per wave cycle
    const lfoG = ctx.createGain();
    lfoG.gain.value = 0.3;
    lfo.connect(lfoG); lfoG.connect(innerG.gain);
    src.connect(lp); lp.connect(innerG); innerG.connect(fadeG); fadeG.connect(dest);
    src.start(); lfo.start();
    return { gain: fadeG };
  }

  function initAudio() {
    if (audioReady) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return; // no WebAudio available; sound silently unavailable
    audioCtx = new AC();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.035; // overall level — very quiet
    masterGain.connect(audioCtx.destination);
    tracks.hum   = makeHum  (audioCtx, masterGain);
    tracks.wind  = makeWind (audioCtx, masterGain);
    tracks.water = makeWater(audioCtx, masterGain);
    audioReady = true;
  }

  async function setSoundTrack(id) {
    if (id) initAudio();
    if (audioReady && audioCtx.state === "suspended") { try { await audioCtx.resume(); } catch {} }
    if (audioReady) {
      const now = audioCtx.currentTime;
      const fade = 2.5;
      for (const key of Object.keys(tracks)) {
        const t = tracks[key];
        const target = key === id ? 1 : 0;
        t.gain.gain.cancelScheduledValues(now);
        t.gain.gain.setValueAtTime(t.gain.gain.value, now);
        t.gain.gain.linearRampToValueAtTime(target, now + fade);
      }
    }
    currentSound = id;
    const btn = document.getElementById("btn-sound");
    btn.classList.toggle("knob-on", id !== null);
    btn.setAttribute("aria-pressed", String(id !== null));
    updateSoundLabel();
  }

  function cycleSound() {
    const i = SOUND_ORDER.indexOf(currentSound);
    setSoundTrack(SOUND_ORDER[(i + 1) % SOUND_ORDER.length]);
  }

  function updateSoundLabel() {
    const key = currentSound || "silent";
    document.querySelector("#btn-sound .label").textContent = STRINGS[LANG].sounds[key];
  }
  updateSoundLabel();

  function cycleScene() {
    const i = SCENE_ORDER.indexOf(currentScene);
    currentScene = SCENE_ORDER[(i + 1) % SCENE_ORDER.length];
    localStorage.setItem("within_scene", currentScene);
    updateSceneLabel();
  }

  // Knob wiring — stop propagation so clicks don't also start a Minute
  document.getElementById("btn-sound").addEventListener("pointerdown", (e) => e.stopPropagation());
  document.getElementById("btn-scene").addEventListener("pointerdown", (e) => e.stopPropagation());
  document.getElementById("btn-sound").addEventListener("click", (e) => {
    e.stopPropagation();
    cycleSound();
  });
  document.getElementById("btn-scene").addEventListener("click", (e) => {
    e.stopPropagation();
    cycleScene();
  });

  // ────── Per-experiment keyboard ──────
  // Experiments start only by clicking an invitation (wired on each .invitation
  // button). The page itself no longer reacts to Space or to taps on empty
  // space — home stays home unless you choose a ritual deliberately.
  // During leave-word: Enter submits, Escape quiets home.
  // During gaze: Escape quiets home.
  // During stone: Space (hold) picks up / lets go; Escape cancels.
  document.addEventListener("keydown", (e) => {
    if (currentStep === "leave-word") {
      if (e.key === "Enter")       { e.preventDefault(); submitWord(); }
      else if (e.key === "Escape") { e.preventDefault(); quietReturn(); }
    } else if (currentExperiment === "gaze") {
      if (e.key === "Escape") { e.preventDefault(); gazeCancel(); }
    } else if (currentExperiment === "stone") {
      if (e.key === "Escape") { e.preventDefault(); stoneCancel(); }
      else if (e.key === " ") {
        e.preventDefault();
        if (!stoneSpaceHeld) {
          stoneSpaceHeld = true;
          stonePressBegin();
        }
      }
    }
  });
  document.addEventListener("keyup", (e) => {
    if (currentExperiment === "stone" && e.key === " ") {
      e.preventDefault();
      stoneSpaceHeld = false;
      if (stonePointers.size === 0) stonePressEnd();
    }
  });
  // Pointer (mouse + touch) — only active during the stone ritual
  document.addEventListener("pointerdown", (e) => {
    if (currentExperiment !== "stone") return;
    // Ignore presses on knobs/input so they can still be used during the ritual
    // (knobs are hidden during experiments anyway, but defensive)
    if (e.target.closest("input") || e.target.closest("button")) return;
    stonePointers.add(e.pointerId);
    if (stonePointers.size === 1 && !stoneSpaceHeld) stonePressBegin();
  });
  function onPointerRelease(e) {
    if (currentExperiment !== "stone") return;
    stonePointers.delete(e.pointerId);
    if (stonePointers.size === 0 && !stoneSpaceHeld) stonePressEnd();
  }
  document.addEventListener("pointerup", onPointerRelease);
  document.addEventListener("pointercancel", onPointerRelease);

  // ────── The Minute ──────
  async function runMinute() {
    setStep("breath");
    // Pick a word for the Minute
    const seed = hashString(dayKey() + ":" + Math.floor(Date.now() / 60000));
    const minuteWord = wordPool[seed % wordPool.length];
    els.breathWord.textContent = minuteWord;
    els.breathWord.style.opacity = "0";

    const start = performance.now();
    const cycleMs = 10000;  // 4s in, 6s out
    const totalMs = 60000;
    const wordIn   = 20000;
    const wordHold = 28000;
    const wordOut  = 44000;

    const R_MIN = 38, R_MAX = 84;

    function tick() {
      if (currentStep !== "breath") return; // user left early
      const now = performance.now();
      const elapsed = now - start;

      if (elapsed >= totalMs) {
        els.breathCircle.setAttribute("r", R_MIN.toFixed(2));
        els.breathWord.style.opacity = "0";
        leaveAWord();
        return;
      }

      const phase = (elapsed % cycleMs) / cycleMs;
      let r;
      if (phase < 0.40) {
        // inhale
        r = lerp(R_MIN, R_MAX, easeInOutSine(phase / 0.40));
      } else if (phase < 0.50) {
        // dwell full
        r = R_MAX;
      } else if (phase < 0.95) {
        // exhale
        r = lerp(R_MAX, R_MIN, easeInOutSine((phase - 0.50) / 0.45));
      } else {
        // dwell empty
        r = R_MIN;
      }
      els.breathCircle.setAttribute("r", r.toFixed(2));

      // Word fade in/hold/out
      let wo;
      if (elapsed < wordIn)        wo = 0;
      else if (elapsed < wordHold) wo = easeInOutSine((elapsed - wordIn) / (wordHold - wordIn));
      else if (elapsed < wordOut)  wo = 1;
      else                         wo = 1 - easeInOutSine((elapsed - wordOut) / (totalMs - wordOut));
      els.breathWord.style.opacity = String(wo * 0.82);

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  // ────── Leave a word ──────
  const LEAVE_IDLE_MS = 25000; // if untouched for this long, fade quietly back
  let leaveIdleTimer = null;
  function bumpLeaveIdle() {
    clearTimeout(leaveIdleTimer);
    leaveIdleTimer = setTimeout(() => {
      if (currentStep === "leave-word") quietReturn();
    }, LEAVE_IDLE_MS);
  }

  function leaveAWord() {
    setStep("leave-word");
    setTimeout(() => els.wordInput.focus({ preventScroll: true }), 700);
    bumpLeaveIdle();
  }

  function submitWord() {
    clearTimeout(leaveIdleTimer);
    const v = (els.wordInput.value || "").trim().toLowerCase();
    if (!v) return quietReturn();
    renderStill(v);
  }

  // A "soft" return from the Minute's leave-word step: no mark saved, no Still.
  function quietReturn() {
    clearTimeout(leaveIdleTimer);
    els.wordInput.value = "";
    goHome();
  }

  // Reset the idle timer on every keystroke in the input
  els.wordInput.addEventListener("input", () => {
    if (currentStep === "leave-word") bumpLeaveIdle();
  });

  // ────── The Still ──────
  function renderStill(seedSource) {
    setStep("still");
    const seed = hashString(seedSource + ":" + dayKey() + ":" + new Date().getHours());
    saveMark({ seed, word: seedSource, t: Date.now() });
    freshSeed = seed;
    freshBornAt = performance.now();
    refreshWordsKnob();

    // After the still holds, return home
    setTimeout(() => {
      els.wordInput.value = "";
      goHome();
    }, STILL_HOLD_MS);
  }

  // ────── A Gaze ──────
  // A 60-second visual rest. A single soft point of light traces a slow
  // Lissajous path across the central ~70% of the viewport. No input, no artifact.
  // At 60s the point fades, a soft closing line holds ~3s, then home returns.
  // Escape cancels without showing the line.
  const GAZE_TOTAL_MS    = 60000;
  const GAZE_FADE_IN_MS  = 2500;
  const GAZE_FADE_OUT_MS = 2000;
  const GAZE_REST_HOLD_MS = 3000;

  let gazeStartTime = 0;
  let gazeEndTimer = null;
  let gazeRestTimer = null;
  // Seed phases by day so the curve varies day to day but is stable within a day
  let gazePhaseX = 0, gazePhaseY = 0;

  function gazeStart() {
    setStep("gaze");
    gazeStartTime = performance.now();
    const dSeed = hashString("gaze:" + dayKey());
    gazePhaseX = (dSeed & 0xffff) / 0xffff * Math.PI * 2;
    gazePhaseY = ((dSeed >>> 16) & 0xffff) / 0xffff * Math.PI * 2;
    clearTimeout(gazeEndTimer);
    clearTimeout(gazeRestTimer);
    // Natural end: fade out point, show rest line, then go home
    gazeEndTimer = setTimeout(() => {
      if (currentExperiment !== "gaze") return;
      setStep("gaze-rest");
      gazeRestTimer = setTimeout(() => {
        if (currentExperiment !== "gaze") return;
        goHome();
      }, GAZE_REST_HOLD_MS);
    }, GAZE_TOTAL_MS);
  }

  function gazeCancel() {
    clearTimeout(gazeEndTimer);
    clearTimeout(gazeRestTimer);
    goHome();
  }

  function gazeDraw(_t, pal) {
    if (currentExperiment !== "gaze") return;
    // Only paint the point during the gaze step (not during gaze-rest).
    if (currentStep !== "gaze") return;
    const elapsed = performance.now() - gazeStartTime;
    // Alpha: fade in over first 2.5s, hold, fade out over last 2s
    let alpha;
    if (elapsed < GAZE_FADE_IN_MS) {
      alpha = easeInOutSine(elapsed / GAZE_FADE_IN_MS);
    } else if (elapsed > GAZE_TOTAL_MS - GAZE_FADE_OUT_MS) {
      alpha = 1 - easeInOutSine((elapsed - (GAZE_TOTAL_MS - GAZE_FADE_OUT_MS)) / GAZE_FADE_OUT_MS);
    } else {
      alpha = 1;
    }
    alpha = clamp(alpha, 0, 1) * 0.85;
    if (alpha <= 0.001) return;

    // Lissajous in seconds, confined to central ~70% of the viewport.
    const ts = elapsed / 1000;
    const x = (0.5 + 0.32 * Math.sin(0.25 * ts + gazePhaseX)) * W;
    const y = (0.5 + 0.28 * Math.sin(0.38 * ts + gazePhaseY)) * H;
    const r = Math.min(W, H) * 0.04; // ~24-40px depending on viewport

    const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
    rg.addColorStop(0,   rgba(pal.accent, 0.95 * alpha));
    rg.addColorStop(0.5, rgba(pal.accent, 0.35 * alpha));
    rg.addColorStop(1,   rgba(pal.accent, 0));
    ctx.fillStyle = rg;
    ctx.fillRect(x - r, y - r, r * 2, r * 2);
  }

  // ────── Clock ──────
  // Quiet hour:minute readout at the bottom-right of the home, aligned with
  // the knobs bar. Locale-aware: EN gets 12-hour with am/pm, PT gets 24-hour.
  // Ticks every 15s — enough to stay fresh, not enough to feel restless.
  const clockEl = document.getElementById("clock");
  const clockFmt = new Intl.DateTimeFormat(LANG, { hour: "2-digit", minute: "2-digit" });
  function updateClock() {
    clockEl.textContent = clockFmt.format(new Date()).toLowerCase();
  }
  updateClock();
  setInterval(updateClock, 15000);

  // ────── A Stone ──────
  // A kinetic ritual. A soft stone sits at centre-low. Press anywhere (or hold
  // Space) to "pick it up" — it lifts and sways gently as if held in the hand.
  // Release to let it fall and dissolve. No time limit; Escape cancels.
  const STONE_LIFT_MS = 1000;   // how long the lift animation takes
  const STONE_RELEASE_MS = 1800; // total release duration (fall + fade)
  const STONE_FALL_MS = 1000;    // stone visually falls within the first ~1s of release
  const STONE_SWAY_PERIOD_MS = 4000; // slow breath-like sway when held

  let stoneState = "idle"; // "idle" | "wait" | "held" | "releasing"
  let stoneHoldStart = 0;   // time of press
  let stoneReleaseStart = 0;
  let stoneReleaseTimer = null;
  const stonePointers = new Set();
  let stoneSpaceHeld = false;

  function stoneHintText() {
    if (stoneState === "releasing") return STRINGS[LANG].stone.let;
    return STRINGS[LANG].stone.hold;
  }
  function updateStoneHint() {
    document.getElementById("stone-hint").textContent = stoneHintText();
  }

  function stoneStart() {
    stoneState = "wait";
    stonePointers.clear();
    stoneSpaceHeld = false;
    clearTimeout(stoneReleaseTimer);
    updateStoneHint();
    setStep("stone-wait");
  }

  function stonePressBegin() {
    if (currentExperiment !== "stone") return;
    if (stoneState !== "wait") return; // only transition from wait
    stoneState = "held";
    stoneHoldStart = performance.now();
    setStep("stone-held");
  }

  function stonePressEnd() {
    if (currentExperiment !== "stone") return;
    if (stoneState !== "held") return;
    stoneState = "releasing";
    stoneReleaseStart = performance.now();
    updateStoneHint();
    setStep("stone-release");
    clearTimeout(stoneReleaseTimer);
    stoneReleaseTimer = setTimeout(() => {
      if (currentExperiment !== "stone") return;
      if (stoneState !== "releasing") return;
      stoneState = "idle";
      goHome();
    }, STONE_RELEASE_MS);
  }

  function stoneCancel() {
    stoneState = "idle";
    stonePointers.clear();
    stoneSpaceHeld = false;
    clearTimeout(stoneReleaseTimer);
    goHome();
  }

  // Helper: soft radial ellipse on canvas (circular gradient scaled vertically)
  function drawSoftEllipse(cx, cy, rx, ry, colorRGB, innerA, outerA) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, ry / rx);
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, rx);
    g.addColorStop(0,   rgba(colorRGB, innerA));
    g.addColorStop(0.5, rgba(colorRGB, innerA * 0.45));
    g.addColorStop(1,   rgba(colorRGB, outerA));
    ctx.fillStyle = g;
    ctx.fillRect(-rx, -rx, rx * 2, rx * 2);
    ctx.restore();
  }

  function stoneDraw(_t, pal) {
    if (currentExperiment !== "stone") return;
    if (stoneState === "idle") return;

    const now = performance.now();
    const m = Math.min(W, H);
    const baseY = H * 0.60;
    const groundY = baseY + m * 0.035; // just under the stone's rest position
    const cx = W / 2;
    const rx = m * 0.065;
    const ry = m * 0.038;
    const liftAmount = m * 0.075;

    let lift = 0;         // 0 = resting, 1 = fully raised
    let alpha = 0.75;

    if (stoneState === "wait") {
      lift = 0;
      alpha = 0.75;
    } else if (stoneState === "held") {
      const elapsed = now - stoneHoldStart;
      const raised = clamp(elapsed / STONE_LIFT_MS, 0, 1);
      lift = easeInOutSine(raised);
      alpha = 0.8 + 0.15 * lift;
    } else if (stoneState === "releasing") {
      const elapsed = now - stoneReleaseStart;
      const fallT = clamp(elapsed / STONE_FALL_MS, 0, 1);
      // Start the release at lift=1 and fall through an easeIn curve
      const fall = 1 - (fallT * fallT); // quadratic fall (faster near the end)
      lift = fall;
      alpha = 0.95 * (1 - clamp(elapsed / STONE_RELEASE_MS, 0, 1));
    }

    if (alpha <= 0.01) return;

    // Sway — only while fully lifted and held
    let sway = 0;
    if (stoneState === "held" && lift > 0.95) {
      const holdElapsed = now - stoneHoldStart - STONE_LIFT_MS;
      sway = Math.sin((holdElapsed / STONE_SWAY_PERIOD_MS) * Math.PI * 2) * m * 0.005;
    }

    const stoneY = baseY - liftAmount * lift + sway;

    // Shadow on the ground — compresses + fades as the stone rises
    const shadowAlpha = 0.35 * (1 - lift * 0.6) * (alpha / 0.9);
    if (shadowAlpha > 0.01) {
      const sRx = rx * (1 + lift * 0.25);
      const sRy = ry * 0.35 * (1 - lift * 0.35);
      drawSoftEllipse(cx, groundY, sRx, sRy, [0.02, 0.02, 0.06], shadowAlpha, 0);
    }

    // Soft glow around the stone (palette accent for the hue of the moment)
    const glowR = Math.max(rx, ry) * 2.6;
    const glowGrad = ctx.createRadialGradient(cx, stoneY, 0, cx, stoneY, glowR);
    glowGrad.addColorStop(0, rgba(pal.accent, 0.22 * alpha));
    glowGrad.addColorStop(1, rgba(pal.accent, 0));
    ctx.fillStyle = glowGrad;
    ctx.fillRect(cx - glowR, stoneY - glowR, glowR * 2, glowR * 2);

    // The stone itself — uses pal.ink for auto-contrast (dark on light bg,
    // light on dark bg) so the stone always reads as a physical presence.
    drawSoftEllipse(cx, stoneY, rx, ry, pal.ink, 0.85 * alpha, 0);
  }

  // ────── Tab visibility: pause invitation timing while hidden ──────
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      clearTimeout(invitationTimer);
    } else if (isHome() && currentHome === "ambient") {
      scheduleInvitation();
    }
    // Refresh the clock on return to foreground
    if (!document.hidden) updateClock();
  });

  // ────── Words knob: reveal the collection of kept words for today ──────
  document.querySelector("#btn-words .label").textContent = STRINGS[LANG].words;
  let wordsPanelOpen = false;

  function loadKeptWords() {
    // Return the user's kept words for today, oldest first.
    return loadMarks().map((m) => m.word).filter((w) => typeof w === "string" && w.length && !w.startsWith(":"));
  }

  function refreshWordsKnob() {
    const words = loadKeptWords();
    const btn = document.getElementById("btn-words");
    const sep = document.getElementById("sep-words");
    const show = words.length > 0;
    btn.hidden = !show;
    sep.hidden = !show;
    if (!show) {
      closeWordsPanel();
    } else if (wordsPanelOpen) {
      renderWordsPanel(); // content may have grown
    }
  }

  function renderWordsPanel() {
    const panel = document.getElementById("words-panel");
    const words = loadKeptWords();
    panel.innerHTML = "";
    for (const w of words) {
      const el = document.createElement("span");
      el.className = "w";
      el.textContent = w;
      panel.appendChild(el);
    }
  }

  function openWordsPanel() {
    const panel = document.getElementById("words-panel");
    renderWordsPanel();
    panel.hidden = false;
    wordsPanelOpen = true;
    document.getElementById("btn-words").classList.add("knob-on");
    document.getElementById("btn-words").setAttribute("aria-pressed", "true");
    requestAnimationFrame(() => panel.classList.add("visible"));
  }

  function closeWordsPanel() {
    const panel = document.getElementById("words-panel");
    wordsPanelOpen = false;
    panel.classList.remove("visible");
    document.getElementById("btn-words").classList.remove("knob-on");
    document.getElementById("btn-words").setAttribute("aria-pressed", "false");
    setTimeout(() => { if (!wordsPanelOpen) panel.hidden = true; }, 1300);
  }

  function toggleWordsPanel() {
    wordsPanelOpen ? closeWordsPanel() : openWordsPanel();
  }

  document.getElementById("btn-words").addEventListener("pointerdown", (e) => e.stopPropagation());
  document.getElementById("btn-words").addEventListener("click", (e) => {
    e.stopPropagation();
    toggleWordsPanel();
  });

  // Initial paint
  refreshWordsKnob();
  // Kickstart the draw loop now that all state/registry declarations are live.
  drawField(performance.now());

  // ────── Dev hook (kept for the prototype; harmless) ──────
  if (new URLSearchParams(location.search).has("dev")) {
    window.__within = {
      setHome, setExperiment, setStep, goHome, enterExperiment,
      renderStill, submitWord, quietReturn,
      gazeStart, gazeCancel,
      stoneStart, stonePressBegin, stonePressEnd, stoneCancel,
      setSoundTrack, cycleSound,
      refreshWordsKnob,
      state: () => ({ home: currentHome, experiment: currentExperiment, step: currentStep, sound: currentSound, stoneState }),
      freshSeedPeek: () => freshSeed,
    };
  }
</script>
</body>
</html>
